name: Build and publish firmware release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish Nano firmware
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        shell: pwsh
        run: python -m pip install --upgrade platformio

      - name: Build both Nano variants
        shell: pwsh
        run: |
          pio run `
            --project-dir firmware `
            -e nano-new-bootloader `
            -e nano-old-bootloader

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release

          Copy-Item `
            "firmware/.pio/build/nano-new-bootloader/firmware.hex" `
            "release/firmware-nano-new-bootloader.hex"

          Copy-Item `
            "firmware/.pio/build/nano-old-bootloader/firmware.hex" `
            "release/firmware-nano-old-bootloader.hex"

          Copy-Item `
            "firmware/.pio/build/nano-new-bootloader/firmware.elf" `
            "release/firmware-nano-new-bootloader.elf"

          Copy-Item `
            "firmware/.pio/build/nano-old-bootloader/firmware.elf" `
            "release/firmware-nano-old-bootloader.elf"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Firmware ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/firmware-nano-new-bootloader.hex
            release/firmware-nano-old-bootloader.hex
            release/firmware-nano-new-bootloader.elf
            release/firmware-nano-old-bootloader.elf
          fail_on_unmatched_files: true
