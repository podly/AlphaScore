name: Build PlatformIO firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v6

      - name: Skonfiguruj Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Zainstaluj PlatformIO
        shell: pwsh
        run: python -m pip install --upgrade platformio

      - name: Skompiluj oba warianty Nano
        shell: pwsh
        run: pio run -e nano-newbootloader -e nano-oldbootloader

      - name: Przygotuj pliki firmware
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts

          Copy-Item `
            ".pio/build/nano-newbootloader/firmware.hex" `
            "artifacts/firmware-nano-new-bootloader.hex"

          Copy-Item `
            ".pio/build/nano-oldbootloader/firmware.hex" `
            "artifacts/firmware-nano-old-bootloader.hex"

          Copy-Item `
            ".pio/build/nano-newbootloader/firmware.elf" `
            "artifacts/firmware-nano-new-bootloader.elf"

          Copy-Item `
            ".pio/build/nano-oldbootloader/firmware.elf" `
            "artifacts/firmware-nano-old-bootloader.elf"

      - name: Zapisz firmware
        uses: actions/upload-artifact@v4
        with:
          name: Nano-firmware
          path: artifacts/
          if-no-files-found: error
          retention-days: 30