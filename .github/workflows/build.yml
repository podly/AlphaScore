name: Build PlatformIO firmware

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        shell: pwsh
        run: python -m pip install --upgrade platformio

      - name: Build both Nano variants
        shell: pwsh
        run: |
          pio run `
            --project-dir firmware `
            -e nano-new-bootloader `
            -e nano-old-bootloader

      - name: Prepare firmware files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts

          Copy-Item `
            "firmware/.pio/build/nano-new-bootloader/firmware.hex" `
            "artifacts/firmware-nano-new-bootloader.hex"

          Copy-Item `
            "firmware/.pio/build/nano-old-bootloader/firmware.hex" `
            "artifacts/firmware-nano-old-bootloader.hex"

          Copy-Item `
            "firmware/.pio/build/nano-new-bootloader/firmware.elf" `
            "artifacts/firmware-nano-new-bootloader.elf"

          Copy-Item `
            "firmware/.pio/build/nano-old-bootloader/firmware.elf" `
            "artifacts/firmware-nano-old-bootloader.elf"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v7
        with:
          name: Nano-firmware
          path: artifacts/
          if-no-files-found: error
          retention-days: 30
